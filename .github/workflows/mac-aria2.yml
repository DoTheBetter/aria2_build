name: Build aria2 with OpenSSL for macOS (64-bit)

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/mac-aria2.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          brew update
          brew install \
            automake autoconf libtool pkg-config \
            openssl c-ares libssh2 zlib \
            libxml2 sqlite3 nettle libgmp openpgm

      - name: Set up OpenSSL environment
        run: |
          echo "OPENSSL_ROOT=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl)/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix sqlite3)/lib/pkgconfig:$(brew --prefix libssh2)/lib/pkgconfig:$(brew --prefix zlib)/lib/pkgconfig:$(brew --prefix nettle)/lib/pkgconfig:$(brew --prefix libgmp)/lib/pkgconfig:$(brew --prefix openpgm)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Clone aria2 source code
        run: |
          git clone https://github.com/aria2/aria2.git
          cd aria2

      - name: Apply patches from patch directory
        run: |
          if [ -d "$GITHUB_WORKSPACE/patch" ]; then
            echo "Applying patches from $GITHUB_WORKSPACE/patch..."
            for patch_file in $GITHUB_WORKSPACE/patch/*.patch; do
              echo "Applying patch: $patch_file"
              if ! patch -p1 < "$patch_file"; then
                echo "Failed to apply patch: $patch_file"
                echo "Check the patch file and ensure it is compatible with the current aria2 version."
                exit 1
              fi
            done
          else
            echo "No patch directory found, skipping patch application."
          fi

      - name: Generate configure script
        run: |
          autoreconf -i

      - name: Configure aria2 with full features
        run: |
          ./configure \
            --with-openssl \
            --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
            --enable-static \
            --disable-shared

      - name: Build aria2
        run: |
          make -j$(sysctl -n hw.ncpu)

      - name: Test aria2
        run: |
          ./src/aria2c --version
          make check

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aria2-macos-64bit
          path: aria2/src/aria2c