name: Build aria2 with Schannel for Windows (64/32-bit)

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/windows-aria2.yml'
  workflow_dispatch:

env:
  GMP_VERSION: 6.3.0
  EXPAT_VERSION: 2.6.4
  SQLITE_VERSION: 3480000
  ZLIB_VERSION: 1.3.1
  CARES_VERSION: 1.34.4
  LIBSSH2_VERSION: 1.11.1

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, i686]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Add MSYS2 to PATH
        shell: bash
        run: |
          # 将 MSYS2 的 usr/bin 目录添加到 PATH
          echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      - name: Verify MSYS2 installation
        shell: bash
        run: |
          # 检查 pacman 是否可用
          pacman --version

      - name: Update MSYS2 and install basic tools
        shell: bash
        run: |
          # 更新 MSYS2
          pacman -Syu --noconfirm
          pacman -Su --noconfirm

          # 安装基本工具
          pacman -S --noconfirm --needed base-devel mingw-w64-${{ matrix.arch }}-toolchain autoconf automake libtool pkg-config

      - name: Download dependency sources
        shell: bash
        run: |
          mkdir -p ~/aria2-deps
          cd ~/aria2-deps
          
          EXPAT_VERSION_UNDERSCORE=$(echo ${{ env.EXPAT_VERSION }} | sed 's/\./_/g')
          EXPAT_VERSION_UNDERSCORE="R_${EXPAT_VERSION_UNDERSCORE}"

          # 下载依赖源码
          curl -L -O https://ftpmirror.gnu.org/gmp/gmp-${{ env.GMP_VERSION }}.tar.gz
          curl -L -O https://github.com/libexpat/libexpat/releases/download/$EXPAT_VERSION_UNDERSCORE/expat-${{ env.EXPAT_VERSION }}.tar.gz
          curl -L -O https://www.sqlite.org/2025/sqlite-autoconf-${{ env.SQLITE_VERSION }}.tar.gz
          curl -L -O https://zlib.net/zlib-${{ env.ZLIB_VERSION }}.tar.gz
          curl -L -O https://c-ares.haxx.se/download/c-ares-${{ env.CARES_VERSION }}.tar.gz
          curl -L -O https://www.libssh2.org/download/libssh2-${{ env.LIBSSH2_VERSION }}.tar.gz

          # 解压源码
          tar -xf gmp-${{ env.GMP_VERSION }}.tar.gz
          tar -xf expat-${{ env.EXPAT_VERSION }}.tar.gz
          tar -xf sqlite-autoconf-${{ env.SQLITE_VERSION }}.tar.gz
          tar -xf zlib-${{ env.ZLIB_VERSION }}.tar.gz
          tar -xf c-ares-${{ env.CARES_VERSION }}.tar.gz
          tar -xf libssh2-${{ env.LIBSSH2_VERSION }}.tar.gz

      - name: Build and install GMP
        shell: bash
        run: |
          cd ~/aria2-deps/gmp-${{ env.GMP_VERSION }}
          ./configure --host=${{ matrix.arch }}-w64-mingw32 --prefix=/usr/local/${{ matrix.arch }}-w64-mingw32 --disable-shared --enable-static
          make -j$(nproc)
          make install

      - name: Build and install Expat
        shell: bash
        run: |
          cd ~/aria2-deps/expat-${{ env.EXPAT_VERSION }}
          ./configure --host=${{ matrix.arch }}-w64-mingw32 --prefix=/usr/local/${{ matrix.arch }}-w64-mingw32 --disable-shared --enable-static
          make -j$(nproc)
          make install

      - name: Build and install SQLite
        shell: bash
        run: |
          cd ~/aria2-deps/sqlite-autoconf-${{ env.SQLITE_VERSION }}
          ./configure --host=${{ matrix.arch }}-w64-mingw32 --prefix=/usr/local/${{ matrix.arch }}-w64-mingw32 --disable-shared --enable-static
          make -j$(nproc)
          make install

      - name: Build and install zlib
        shell: bash
        run: |
          cd ~/aria2-deps/zlib-${{ env.ZLIB_VERSION }}
          make -f win32/Makefile.gcc PREFIX=${{ matrix.arch }}-w64-mingw32-
          make -f win32/Makefile.gcc PREFIX=${{ matrix.arch }}-w64-mingw32- install

      - name: Build and install c-ares
        shell: bash
        run: |
          cd ~/aria2-deps/c-ares-${{ env.CARES_VERSION }}
          ./configure --host=${{ matrix.arch }}-w64-mingw32 --prefix=/usr/local/${{ matrix.arch }}-w64-mingw32 --disable-shared --enable-static
          make -j$(nproc)
          make install

      - name: Build and install libssh2
        shell: bash
        run: |
          cd ~/aria2-deps/libssh2-${{ env.LIBSSH2_VERSION }}
          ./configure --host=${{ matrix.arch }}-w64-mingw32 --prefix=/usr/local/${{ matrix.arch }}-w64-mingw32 --disable-shared --enable-static --with-libssl-prefix=/usr/local/${{ matrix.arch }}-w64-mingw32
          make -j$(nproc)
          make install

      - name: Download aria2 source code
        shell: bash
        run: |
          git clone https://github.com/aria2/aria2.git
          cd aria2

      - name: Generate configure script
        shell: bash
        run: |
          cd aria2
          autoreconf -i

      - name: Configure aria2
        shell: bash
        run: |
          cd aria2
          ./configure --host=${{ matrix.arch }}-w64-mingw32 --enable-static --disable-shared

      - name: Build aria2
        shell: bash
        run: |
          cd aria2
          make -j$(nproc)

      - name: Test aria2
        shell: bash
        run: |
          cd aria2/src
          ./aria2c.exe --version

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.arch }}
          cp aria2/src/aria2c.exe dist/${{ matrix.arch }}/
          cd dist
          zip -r aria2-windows-${{ matrix.arch }}.zip ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: aria2-windows-${{ matrix.arch }}
          path: dist/aria2-windows-${{ matrix.arch }}.zip