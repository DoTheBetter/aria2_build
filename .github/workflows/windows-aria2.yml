name: Build aria2 with Schannel for Windows (64/32-bit)

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/windows-aria2.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [i686-w64-mingw32, x86_64-w64-mingw32]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up environment for ${{ matrix.host }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils autoconf automake autotools-dev libtool \
            patch ca-certificates \
            pkg-config git curl dpkg-dev gcc-mingw-w64 g++-mingw-w64 \
            autopoint libcppunit-dev libxml2-dev libgcrypt20-dev lzip \
            python3-docutils

      - name: Download and build dependencies
        run: |
          # Download dependencies
          curl -L -O https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          curl -L -O https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.bz2
          curl -L -O https://www.sqlite.org/2023/sqlite-autoconf-3430100.tar.gz
          curl -L -O https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
          curl -L -O https://github.com/c-ares/c-ares/releases/download/cares-1_19_1/c-ares-1.19.1.tar.gz
          curl -L -O https://libssh2.org/download/libssh2-1.11.0.tar.bz2

          # Extract and build GMP
          tar xf gmp-6.3.0.tar.xz
          cd gmp-6.3.0
          ./configure \
            --disable-shared \
            --enable-static \
            --prefix=/usr/local/${{ matrix.host }} \
            --host=${{ matrix.host }} \
            --disable-cxx \
            --enable-fat \
            CFLAGS="-mtune=generic -O2 -g0"
          make -j$(nproc) install
          cd ..

          # Extract and build Expat
          tar xf expat-2.5.0.tar.bz2
          cd expat-2.5.0
          ./configure \
            --disable-shared \
            --enable-static \
            --prefix=/usr/local/${{ matrix.host }} \
            --host=${{ matrix.host }} \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          make -j$(nproc) install
          cd ..

          # Extract and build SQLite
          tar xf sqlite-autoconf-3430100.tar.gz
          cd sqlite-autoconf-3430100
          ./configure \
            --disable-shared \
            --enable-static \
            --prefix=/usr/local/${{ matrix.host }} \
            --host=${{ matrix.host }} \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          make -j$(nproc) install
          cd ..

          # Extract and build Zlib
          tar xf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          CC=${{ matrix.host }}-gcc \
          AR=${{ matrix.host }}-ar \
          LD=${{ matrix.host }}-ld \
          RANLIB=${{ matrix.host }}-ranlib \
          STRIP=${{ matrix.host }}-strip \
          ./configure \
            --prefix=/usr/local/${{ matrix.host }} \
            --libdir=/usr/local/${{ matrix.host }}/lib \
            --includedir=/usr/local/${{ matrix.host }}/include \
            --static
          make -j$(nproc) install
          cd ..

          # Extract and build c-ares
          tar xf c-ares-1.19.1.tar.gz
          cd c-ares-1.19.1
          ./configure \
            --disable-shared \
            --enable-static \
            --without-random \
            --prefix=/usr/local/${{ matrix.host }} \
            --host=${{ matrix.host }} \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32"
          make -j$(nproc) install
          cd ..

          # Extract and build libssh2
          tar xf libssh2-1.11.0.tar.bz2
          cd libssh2-1.11.0
          ./configure \
            --disable-shared \
            --enable-static \
            --prefix=/usr/local/${{ matrix.host }} \
            --host=${{ matrix.host }} \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32"
          make -j$(nproc) install
          cd ..

      - name: Clone and build aria2
        run: |
          git clone --depth 1 https://github.com/aria2/aria2
          cd aria2
          autoreconf -i
          ./configure \
            --host=${{ matrix.host }} \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          ${{ matrix.host }}-strip src/aria2c.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: aria2c-${{ matrix.host }}-static
          path: aria2/src/aria2c.exe