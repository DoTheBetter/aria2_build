name: Build aria2 with Schannel for Windows (64/32-bit)

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/windows-aria2.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, i686]  # 64-bit and 32-bit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          repository: aria2/aria2  # 拉取官方仓库
          path: aria2-official     # 将官方仓库检出到 aria2-official 目录

      - name: Apply patches
        shell: bash
        run: |
          # 切换到官方仓库目录
          cd aria2-official

          # 应用补丁文件（假设补丁文件位于仓库根目录的 patches/ 目录下）
          if [ -d "$GITHUB_WORKSPACE/patch" ]; then
            for patch_file in $GITHUB_WORKSPACE/patch/*.patch; do
              patch -p1 < "$patch_file" || exit 1
            done
          fi

      - name: Set up MSYS2
        shell: pwsh
        run: |
          # 下载并安装 MSYS2
          Invoke-WebRequest -Uri "https://github.com/msys2/msys2-installer/releases/download/nightly-x86_64/msys2-base-x86_64-latest.sfx.exe" -OutFile "msys2.exe"
          .\msys2.exe -y -oC:\
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Syu"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Su"

      - name: Install dependencies
        shell: bash
        run: |
          # 安装 MinGW 工具链和依赖项
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            /c/msys64/usr/bin/bash -lc "pacman --noconfirm -S mingw-w64-x86_64-toolchain \
              mingw-w64-x86_64-zlib \
              mingw-w64-x86_64-libssh2 \
              mingw-w64-x86_64-sqlite3 \
              mingw-w64-x86_64-c-ares \
              mingw-w64-x86_64-libxml2 \
              mingw-w64-x86_64-expat \
              mingw-w64-x86_64-nettle \
              mingw-w64-x86_64-gmp \
              autoconf \
              automake \
              libtool \
              make \
              mingw-w64-x86_64-gettext"
          else
            /c/msys64/usr/bin/bash -lc "pacman --noconfirm -S mingw-w64-i686-toolchain \
              mingw-w64-i686-zlib \
              mingw-w64-i686-libssh2 \
              mingw-w64-i686-sqlite3 \
              mingw-w64-i686-c-ares \
              mingw-w64-i686-libxml2 \
              mingw-w64-i686-expat \
              mingw-w64-i686-nettle \
              mingw-w64-i686-gmp \
              autoconf \
              automake \
              libtool \
              make \
              mingw-w64-i686-gettext"
          fi

      - name: Install wget
        shell: bash
        run: |
          # 安装 wget
          /c/msys64/usr/bin/bash -lc "pacman --noconfirm -S wget"

      - name: Download and install archive.dir.tar.xz
        shell: bash
        run: |
          # 在 MSYS2 环境中使用 wget 下载 gettext 源码包
          /c/msys64/usr/bin/bash -lc "wget https://ftpmirror.gnu.org/gettext/gettext-0.22.4.tar.xz -O gettext.tar.xz"

          # 解压 gettext 源码包
          /c/msys64/usr/bin/bash -lc "tar -xf gettext.tar.xz"

          # 找到 archive.dir.tar.xz 文件
          ARCHIVE_DIR=$(/c/msys64/usr/bin/bash -lc "find . -name 'archive.dir.tar.xz' | head -n 1")

          # 检查是否找到文件
          if [ -z "$ARCHIVE_DIR" ]; then
            echo "Error: archive.dir.tar.xz not found!"
            exit 1
          fi

          # 将 archive.dir.tar.xz 文件复制到 /usr/share/gettext/ 目录
          /c/msys64/usr/bin/bash -lc "mkdir -p /usr/share/gettext"
          /c/msys64/usr/bin/bash -lc "cp '$ARCHIVE_DIR' /usr/share/gettext/"

      - name: Set up build environment
        shell: bash
        run: |
          # 设置环境变量
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            echo "MSYSTEM=MINGW64" >> $GITHUB_ENV
            echo "MINGW_PREFIX=/mingw64" >> $GITHUB_ENV
          else
            echo "MSYSTEM=MINGW32" >> $GITHUB_ENV
            echo "MINGW_PREFIX=/mingw32" >> $GITHUB_ENV