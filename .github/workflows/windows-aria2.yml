name: Build aria2 with Schannel for Windows (64/32-bit)

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/windows-aria2.yml'
  workflow_dispatch:

# 设置默认的 shell 为 PowerShell
defaults:
  run:
    shell: pwsh

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, i686]  # 64-bit and 32-bit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          repository: aria2/aria2  # 拉取官方仓库
          path: aria2-official     # 将官方仓库检出到 aria2-official 目录

      - name: Apply patches
        run: |
          # 切换到官方仓库目录
          Set-Location -Path aria2-official

          # 应用补丁文件（假设补丁文件位于仓库根目录的 patch/ 目录下）
          if (Test-Path -Path "$env:GITHUB_WORKSPACE\patch") {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE\patch\*.patch" | ForEach-Object {
              git apply $_.FullName
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Failed to apply patch: $($_.FullName)"
                exit 1
              }
            }
          }

      - name: Set up MSYS2
        run: |
          # 下载并安装 MSYS2
          Invoke-WebRequest -Uri "https://github.com/msys2/msys2-installer/releases/download/nightly-x86_64/msys2-base-x86_64-latest.sfx.exe" -OutFile "msys2.exe"
          .\msys2.exe -y -oC:\
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Syu"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Su"

      - name: Install dependencies
        run: |
          # 安装 MinGW 工具链和依赖项
          if ("${{ matrix.arch }}" -eq "x86_64") {
            C:\msys64\usr\bin\bash -lc "pacman --noconfirm -S mingw-w64-x86_64-toolchain \
              mingw-w64-x86_64-zlib \
              mingw-w64-x86_64-libssh2 \
              mingw-w64-x86_64-sqlite3 \
              mingw-w64-x86_64-c-ares \
              mingw-w64-x86_64-libxml2 \
              mingw-w64-x86_64-expat \
              mingw-w64-x86_64-nettle \
              mingw-w64-x86_64-gmp"
          } else {
            C:\msys64\usr\bin\bash -lc "pacman --noconfirm -S mingw-w64-i686-toolchain \
              mingw-w64-i686-zlib \
              mingw-w64-i686-libssh2 \
              mingw-w64-i686-sqlite3 \
              mingw-w64-i686-c-ares \
              mingw-w64-i686-libxml2 \
              mingw-w64-i686-expat \
              mingw-w64-i686-nettle \
              mingw-w64-i686-gmp"
          }

      - name: Set up build environment
        run: |
          # 设置环境变量
          if ("${{ matrix.arch }}" -eq "x86_64") {
            echo "MSYSTEM=MINGW64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "MINGW_PREFIX=/mingw64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "MSYSTEM=MINGW32" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "MINGW_PREFIX=/mingw32" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build aria2
        run: |
          # 切换到官方仓库目录
          Set-Location -Path aria2-official

          # 生成 configure 脚本
          bash -lc "autoreconf -i"

          # 配置并构建 aria2，启用推荐的选项
          bash -lc "./configure \
            --host=${{ matrix.arch }}-w64-mingw32 \
            --enable-static \
            --disable-shared \
            --with-libxml2 \
            --with-libssh2 \
            --with-sqlite3 \
            --with-c-ares \
            --with-zlib \
            --with-gmp \
            --with-nettle \
            --with-expat"

          bash -lc "make -j$(nproc)"

      - name: Run unit tests (make check)
        run: |
          # 切换到官方仓库目录
          Set-Location -Path aria2-official

          # 运行单元测试
          bash -lc "make check"

      - name: Check aria2c version
        run: |
          # 切换到官方仓库目录
          Set-Location -Path aria2-official

          # 输出 aria2c 版本以验证构建成功
          bash -lc "./src/aria2c --version"

      - name: Package artifacts
        run: |
          # 切换到官方仓库目录
          Set-Location -Path aria2-official

          # 创建分发目录
          New-Item -ItemType Directory -Path "dist\${{ matrix.arch }}" -Force
          Copy-Item -Path "src\aria2c.exe" -Destination "dist\${{ matrix.arch }}\"

          # 打包成 ZIP 文件
          Compress-Archive -Path "dist\${{ matrix.arch }}" -DestinationPath "dist\aria2-${{ matrix.arch }}-windows-static-recommended.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aria2-${{ matrix.arch }}-windows-static-recommended
          path: aria2-official/dist/aria2-${{ matrix.arch }}-windows-static-recommended.zip