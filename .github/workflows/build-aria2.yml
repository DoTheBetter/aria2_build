name: Build static aria2 with OpenSSL for multiple platforms

on:
  push:
    branches:
      - main  # 仅对 main 分支的推送触发
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [debian-latest, macos-latest, windows-latest]  # 使用 Debian 最新版
        platform: [linux64, linux32, macos64, win64]  # 保留的平台
        exclude:
          - os: debian-latest
            platform: macos64
          - os: debian-latest
            platform: win64  # 去掉 debian-latest, win64
          - os: macos-latest
            platform: linux64
          - os: macos-latest
            platform: linux32  # 去掉 macos-latest, linux32
          - os: macos-latest
            platform: win64
          - os: windows-latest
            platform: linux64
          - os: windows-latest
            platform: linux32  # 去掉 windows-latest, linux32
          - os: windows-latest
            platform: macos64

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v3

    - name: Clone aria2 official repository
      run: |
        git clone https://github.com/aria2/aria2.git aria2-official
        cd aria2-official

    - name: Apply patches (if any)
      shell: bash
      run: |
        # Apply any patches you have in your repository
        if [ -f ../patches/*.patch ]; then
          for patch in ../patches/*.patch; do
            git apply $patch
          done
        fi

    - name: Install dependencies
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            git \
            wget \
            curl \
            tar \
            gzip \
            bzip2 \
            unzip \
            cmake \
            nasm \
            yasm \
            python3 \
            python3-pip \
            libssl-dev \
            libxml2-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libssh2-1-dev \
            libc-ares-dev \
            libgmp-dev \
            libnettle-dev \  # 使用 libnettle-dev 替代 nettle-dev
            libexpat1-dev \
            mingw-w64
        elif [[ "${{ runner.os }}" == "macOS" ]]; then
          # 安装必要的依赖，跳过已安装的包
          brew install automake autoconf libtool pkg-config cmake nasm yasm \
            libxml2 sqlite zlib libssh2 c-ares gmp nettle expat openssl || true
        elif [[ "${{ runner.os }}" == "Windows" ]]; then
          # 安装必要的依赖
          choco install -y mingw make openssl vcredist2015
          # 手动安装 MSYS2
          choco install -y msys2
          # 使用 MSYS2 安装 autoconf, automake, libtool, pkg-config, gettext
          echo "Installing autoconf, automake, libtool, pkg-config, gettext via MSYS2..."
          C:\\tools\\msys64\\usr\\bin\\bash -lc "pacman -S --noconfirm autoconf automake libtool pkg-config gettext"
          # 将 MSYS2 的路径添加到 PATH
          echo "Adding MSYS2 to PATH..."
          echo "C:\\tools\\msys64\\usr\\bin" >> $GITHUB_PATH
        fi

    - name: Configure and build for ${{ matrix.platform }}
      shell: bash
      run: |
        cd aria2-official
        git clean -fdx  # 清理旧的生成文件
        autoreconf -i
        case ${{ matrix.platform }} in
          linux64)
            ./configure --host=x86_64-linux-gnu --with-openssl --enable-static --disable-shared
            ;;
          linux32)
            ./configure --host=i686-linux-gnu --with-openssl --enable-static --disable-shared
            ;;
          macos64)
            ./configure --host=x86_64-apple-darwin --with-openssl --enable-static --disable-shared
            ;;
          win64)
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              # On Windows, use mingw-w64 directly
              ./configure --host=x86_64-w64-mingw32 --with-openssl --enable-static --disable-shared
            else
              # On Linux/macOS, use cross-compilation
              ./mingw-config HOST=x86_64-w64-mingw32 --with-openssl --enable-static --disable-shared
            fi
            ;;
        esac
        make -j2  # 减少并行编译任务数量

    - name: Verify compilation
      shell: bash
      run: |
        cd aria2-official
        if [[ -f src/aria2c ]]; then
          echo "Compilation successful: aria2c binary found."
          ./src/aria2c --version  # 验证 aria2c 是否正常运行
        else
          echo "Error: aria2c binary not found. Compilation failed."
          exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: aria2-${{ matrix.platform }}-static
        path: aria2-official/src/aria2c