name: Build aria2

on:
  push:
    branches:
      - main
    paths:
      - '**'  # 触发条件：推送任何文件时均触发构建
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 增加手工触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, armv7]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Clone aria2 official repository
        run: |
          git clone https://github.com/aria2/aria2.git aria2-official
          cd aria2-official
          git checkout $(git describe --tags $(git rev-list --tags --max-count=1))  # Checkout the latest release

      - name: Find and apply patches
        run: |
          cd aria2-official
          for patch_file in ../patch/*.patch; do
            if [ -f "$patch_file" ]; then
              echo "Applying patch: $patch_file"
              git apply "$patch_file"
              if [ $? -eq 0 ]; then
                echo "Patch applied successfully: $patch_file"
              else
                echo "Failed to apply patch: $patch_file"
                exit 1
              fi
            else
              echo "No patches found in ../patch/"
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Linux binaries
        run: |
          cd aria2-official
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            -f ../Dockerfile.linux \
            -o type=local,dest=./build/linux/${{ matrix.arch }} \
            .

      - name: Check if aria2 is built successfully
        run: |
          cd aria2-official/build/linux/${{ matrix.arch }}/usr/local/bin
          if [ -f aria2c ]; then
            echo "aria2c binary found. Build successful."
          else
            echo "aria2c binary not found. Build failed."
            exit 1
          fi

      - name: Upload Linux binaries as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: aria2-linux-${{ matrix.arch }}
          path: aria2-official/build/linux/${{ matrix.arch }}/usr/local/bin/aria2c

      - name: Upload patched OptionHandlerFactory.cc as artifact
        uses: actions/upload-artifact@v3
        with:
          name: OptionHandlerFactory-linux-${{ matrix.arch }}
          path: aria2-official/src/OptionHandlerFactory.cc

  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, i686]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Clone aria2 official repository
        run: |
          git clone https://github.com/aria2/aria2.git aria2-official
          cd aria2-official
          git checkout $(git describe --tags $(git rev-list --tags --max-count=1))  # Checkout the latest release

      - name: Find and apply patches
        run: |
          cd aria2-official
          for patch_file in ../patch/*.patch; do
            if [ -f "$patch_file" ]; then
              echo "Applying patch: $patch_file"
              git apply "$patch_file"
              if [ $? -eq 0 ]; then
                echo "Patch applied successfully: $patch_file"
              else
                echo "Failed to apply patch: $patch_file"
                exit 1
              fi
            else
              echo "No patches found in ../patch/"
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Windows binaries
        run: |
          cd aria2-official
          docker buildx build \
            --platform windows/${{ matrix.arch }} \
            -f ../Dockerfile.mingw \
            -o type=local,dest=./build/windows/${{ matrix.arch }} \
            .

      - name: Check if aria2 is built successfully
        run: |
          cd aria2-official/build/windows/${{ matrix.arch }}/usr/local/bin
          if [ -f aria2c.exe ]; then
            echo "aria2c.exe binary found. Build successful."
          else
            echo "aria2c.exe binary not found. Build failed."
            exit 1
          fi

      - name: Upload Windows binaries as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: aria2-windows-${{ matrix.arch }}
          path: aria2-official/build/windows/${{ matrix.arch }}/usr/local/bin/aria2c.exe

      - name: Upload patched OptionHandlerFactory.cc as artifact
        uses: actions/upload-artifact@v3
        with:
          name: OptionHandlerFactory-windows-${{ matrix.arch }}
          path: aria2-official/src/OptionHandlerFactory.cc