name: "Build and Release"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"

jobs:
  create-prerelease:
    name: Create Prerelease
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set current date as env variable
        run: echo "NOW=$(date --utc)" >> $GITHUB_ENV
      - name: Delete Continuous Release
        run: gh release delete continuous --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Prerelease Tag
        id: create_prerelease_tag
        run: |
          gh release create continuous -p -t 'Continuous build' --notes "Building time: ${NOW}
          - - -
          "
          # Make sure draft is false
          gh release edit continuous --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  static-build-linux:
    runs-on: ubuntu-latest
    container: "ghcr.io/abcfy2/clang-cross-toolchain-ubuntu:${{ matrix.cross_host }}"
    strategy:
      fail-fast: false
      matrix:
        cross_host:
          - arm-unknown-linux-musleabi
          - armv7-unknown-linux-musleabihf
          - aarch64-unknown-linux-musl
          - loongarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
        # use_libressl: [0, 1]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: downloads/
          key: build-cache-${{ matrix.cross_host }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ matrix.cross_host }}-
      - name: compile
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
          USE_LIBRESSL: "${{ matrix.use_libressl }}"
        run: |
          if [ "${GITHUB_EVENT_NAME}" = release ]; then
            export ARIA2_VER="${GITHUB_REF#refs/*/}"
            echo "ARIA2_VER=${ARIA2_VER}" >> $GITHUB_ENV
          fi
          chmod +x "${GITHUB_WORKSPACE}/build.sh"
          "${GITHUB_WORKSPACE}/build.sh"
      - name: zip archiving
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
          # USE_LIBRESSL: "${{ matrix.use_libressl }}"
        run: |
          apt update && apt install -y zip
          if [ x"${USE_LIBRESSL}" = x"1" ]; then
            ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_libressl_static.zip"
          else
            ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_static.zip"
          fi
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          zip -j9v "/tmp/${ARCHIVE_NAME}" "${GITHUB_WORKSPACE}"/aria2c*
        shell: bash
      - name: Prerelease assets
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          prerelease: true
          draft: false
          tag_name: continuous
          name: Continuous build
          body_path: "${{ github.workspace }}/build_info.md"
          append_body: true
      - name: Upload Github Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          name: aria2 ${{ env.ARIA2_VER }} static release
          body_path: "${{ github.workspace }}/build_info.md"
          append_body: true

  static-build-mingw:
    runs-on: ubuntu-latest
    container: "ghcr.io/abcfy2/mingw-cross-toolchain-ubuntu:${{ matrix.cross_host }}"
    strategy:
      fail-fast: false
      matrix:
        cross_host:
          - x86_64-w64-mingw32
          - i686-w64-mingw32
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: downloads/
          key: build-cache-${{ matrix.cross_host }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ matrix.cross_host }}-
      - name: compile
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
        run: |
          if [ "${GITHUB_EVENT_NAME}" = release ]; then
            export ARIA2_VER="${GITHUB_REF#refs/*/}"
            echo "ARIA2_VER=${ARIA2_VER}" >> $GITHUB_ENV
          fi
          chmod +x "${GITHUB_WORKSPACE}/build.sh"
          "${GITHUB_WORKSPACE}/build.sh"
      - name: zip archiving
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
          # USE_LIBRESSL: "${{ matrix.use_libressl }}"
        run: |
          apt update && apt install -y zip
          if [ x"${USE_LIBRESSL}" = x"1" ]; then
            ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_libressl_static.zip"
          else
            ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_static.zip"
          fi
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          zip -j9v "/tmp/${ARCHIVE_NAME}" "${GITHUB_WORKSPACE}"/aria2c*
        shell: bash
      - name: Prerelease assets
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          prerelease: true
          draft: false
          tag_name: continuous
          name: Continuous build
          body_path: "${{ github.workspace }}/build_info.md"
          append_body: true
      - name: Upload Github Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          name: aria2 ${{ env.ARIA2_VER }} static release
          body_path: "${{ github.workspace }}/build_info.md"
          append_body: true

  build-on-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        run: |
          brew update
          brew install automake autoconf libtool pkg-config
          brew install libssh2 zlib sqlite3 c-ares libxml2 nettle gmp cppunit

      - name: Build aria2
        run: |
          # 设置版本号
          if [ "${GITHUB_EVENT_NAME}" = release ]; then
            export ARIA2_VER="${GITHUB_REF#refs/*/}"
            echo "ARIA2_VER=${ARIA2_VER}" >> $GITHUB_ENV
          fi

          # 克隆 aria2 源码
          git clone https://github.com/aria2/aria2.git aria2-src
          cd aria2-src

          # 获取最新稳定版本或使用指定版本
          if [ -n "${ARIA2_VER}" ]; then
            git checkout "release-${ARIA2_VER}"
          else
            # 获取最新 release 标签
            LATEST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
            git checkout "${LATEST_TAG}"
            export ARIA2_VER="${LATEST_TAG#release-}"
            echo "ARIA2_VER=${ARIA2_VER}" >> $GITHUB_ENV
          fi

          # 设置 PKG_CONFIG_PATH 和库路径
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:/opt/homebrew/opt/libxml2/lib/pkgconfig:/opt/homebrew/opt/sqlite/lib/pkgconfig:/opt/homebrew/opt/c-ares/lib/pkgconfig:/opt/homebrew/opt/libssh2/lib/pkgconfig:/opt/homebrew/opt/zlib/lib/pkgconfig:/opt/homebrew/opt/xz/lib/pkgconfig"
          export LDFLAGS="-L/opt/homebrew/opt/gmp/lib -L/opt/homebrew/opt/nettle/lib"
          export CPPFLAGS="-I/opt/homebrew/opt/gmp/include -I/opt/homebrew/opt/nettle/include"

          # 生成 configure 脚本
          autoreconf -i

          # 配置构建选项
          ./configure \
            --enable-static \
            --disable-shared \
            --with-appletls \
            --with-libz \
            --with-libcares \
            --with-sqlite3 \
            --with-libxml2 \
            --with-libgmp \
            --with-libnettle \
            --with-libssh2 \
            --enable-metalink \
            --enable-bittorrent \
            --enable-websocket \
            --disable-nls \
            --without-libintl-prefix \
            ARIA2_STATIC=yes

          # 编译
          make -j$(sysctl -n hw.ncpu)

          # 创建构建信息
          cd ..
          echo "## Build Info - macOS arm64" > build_info.md
          echo "- macOS arm64 native build" >> build_info.md
          echo "- aria2 version: ${ARIA2_VER:-latest}" >> build_info.md
          echo "- OpenSSL: $(brew list openssl@3 --version | head -1)" >> build_info.md
          echo "- Build date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> build_info.md

      - name: Create archive
        run: |
          ARCHIVE_NAME="aria2-macos-arm64.zip"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          cd aria2-src
          zip -j9v "/tmp/${ARCHIVE_NAME}" src/aria2c

      - name: Prerelease assets
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          prerelease: true
          draft: false
          tag_name: continuous
          name: Continuous build
          body_path: "${{ github.workspace }}/build_info.md"
          append_body: true

      - name: Upload Github Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          name: aria2 ${{ env.ARIA2_VER }} macOS arm64 release
          body_path: "${{ github.workspace }}/build_info.md"
          append_body: true
