name: Release


on:
  workflow_dispatch:

env:
  ARIA2_VERSION: "1.37.0"

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create release directory
        run: mkdir -p release

      - name: Get all workflow run IDs
        id: get_run_ids
        run: |
          RUN_IDS=$(gh api repos/${{ github.repository }}/actions/runs \
            --jq '.workflow_runs[] | .id' \
            --paginate)
          echo "::set-output name=run_ids::$(echo $RUN_IDS | tr '\n' ' ')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts with specific prefix
        run: |
          for RUN_ID in ${{ steps.get_run_ids.outputs.run_ids }}; do
            echo "Checking artifacts from run $RUN_ID..."
            gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
              --jq '.artifacts[] | select(.name | startswith("aria2-${{ env.ARIA2_VERSION }}-")) | .name' \
              --paginate | while read -r ARTIFACT_NAME; do
              echo "Downloading $ARTIFACT_NAME..."
              gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_NAME/zip \
                --header "Accept: application/vnd.github+json" \
                --output "release/$ARTIFACT_NAME.zip"
            done
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        run: |
          ls -R release