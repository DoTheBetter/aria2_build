name: Build aria2 with OpenSSL (Multi-Architecture)

on:
  push:
    branches:
      - master
    paths:
      - '**'  # 触发条件：推送任何文件时均触发构建
  workflow_dispatch:  # 增加手工触发

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04 作为基础环境
    strategy:
      matrix:
        arch: [amd64, arm64, 386, armv7]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install common dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autotools-dev \
            libtool \
            pkg-config \
            libssl-dev \
            libexpat1-dev \
            libc-ares-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libcppunit-dev \
            git \
            wget \
            autopoint

      - name: Set up environment for ${{ matrix.arch }}
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            export CC="gcc"
            export CXX="g++"
            export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
            export ARCH_SUFFIX="linux-amd64"
            # 安装 gcc-multilib 用于 amd64 和 386
            sudo apt-get install -y gcc-multilib
          elif [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC="aarch64-linux-gnu-gcc"
            export CXX="aarch64-linux-gnu-g++"
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
            export ARCH_SUFFIX="linux-arm64"
            # 安装 arm64 交叉编译工具链
            sudo apt-get install -y gcc-11-aarch64-linux-gnu g++-11-aarch64-linux-gnu
            export HOST="aarch64-linux-gnu"  # 设置正确的目标架构名称
          elif [ "${{ matrix.arch }}" = "386" ]; then
            export CC="gcc -m32"
            export CXX="g++ -m32"
            export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            export ARCH_SUFFIX="linux-386"
            # 安装 gcc-multilib 用于 386
            sudo apt-get install -y gcc-multilib
            export HOST="i386-linux-gnu"  # 设置正确的目标架构名称
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            export CC="arm-linux-gnueabihf-gcc"
            export CXX="arm-linux-gnueabihf-g++"
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
            export ARCH_SUFFIX="linux-armv7"
            # 安装 armhf 交叉编译工具链
            sudo apt-get install -y gcc-11-arm-linux-gnueabihf g++-11-arm-linux-gnueabihf
            export HOST="arm-linux-gnueabihf"  # 设置正确的目标架构名称
          fi

      - name: Build and install c-ares
        run: |
          wget https://github.com/c-ares/c-ares/releases/download/v1.34.4/c-ares-1.34.4.tar.gz
          tar xzf c-ares-1.34.4.tar.gz
          cd c-ares-1.34.4
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install expat
        run: |
          wget https://github.com/libexpat/libexpat/releases/download/R_2_6_4/expat-2.6.4.tar.gz
          tar xzf expat-2.6.4.tar.gz
          cd expat-2.6.4
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install zlib
        run: |
          wget https://zlib.net/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install sqlite3
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3480000.tar.gz
          tar xzf sqlite-autoconf-3480000.tar.gz
          cd sqlite-autoconf-3480000
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install libssh2
        run: |
          wget https://libssh2.org/download/libssh2-1.11.1.tar.gz
          tar xzf libssh2-1.11.1.tar.gz
          cd libssh2-1.11.1
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --with-openssl --host=$HOST
          else
            ./configure --prefix=/usr/local --with-openssl
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install aria2 (static)
        run: |
          git clone https://github.com/aria2/aria2.git
          cd aria2

          # 检查 patch 文件夹是否存在
          if [ -d "$GITHUB_WORKSPACE/patch" ]; then
            echo "Applying patches from $GITHUB_WORKSPACE/patch..."
            for patch_file in $GITHUB_WORKSPACE/patch/*.patch; do
              echo "Applying patch: $patch_file"
              patch -p1 < "$patch_file"
            done
          else
            echo "No patch directory found, skipping patch application."
          fi

          autoreconf -f -i
          if [ -n "$HOST" ]; then
            ./configure \
              --prefix=/usr/local \
              --enable-static \
              --disable-shared \
              --with-openssl \
              --without-gnutls \
              --without-libnettle \
              --without-libgcrypt \
              --without-appletls \
              --without-wintls \
              --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
              --with-libexpat \
              --with-libz \
              --with-libcares \
              --with-sqlite3 \
              --with-libssh2 \
              --host=$HOST
          else
            ./configure \
              --prefix=/usr/local \
              --enable-static \
              --disable-shared \
              --with-openssl \
              --without-gnutls \
              --without-libnettle \
              --without-libgcrypt \
              --without-appletls \
              --without-wintls \
              --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
              --with-libexpat \
              --with-libz \
              --with-libcares \
              --with-sqlite3 \
              --with-libssh2
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Verify aria2 compilation
        run: |
          /usr/local/bin/aria2c --version
          if [ $? -eq 0 ]; then
            echo "aria2 compilation verified successfully!"
          else
            echo "aria2 compilation failed!"
            exit 1
          fi

      - name: Package aria2 binary and source files
        run: |
          mkdir -p release
          # 复制编译好的 aria2c 二进制文件
          cp /usr/local/bin/aria2c release/aria2c-$ARCH_SUFFIX
          strip release/aria2c-$ARCH_SUFFIX

          # 复制 aria2 仓库下的 src/OptionHandlerFactory.cc 文件
          if [ -f "aria2/src/OptionHandlerFactory.cc" ]; then
            cp aria2/src/OptionHandlerFactory.cc release/OptionHandlerFactory.cc-$ARCH_SUFFIX
            echo "OptionHandlerFactory.cc copied successfully."
          else
            echo "OptionHandlerFactory.cc not found!"
            exit 1  # 如果文件不存在，退出并报错
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-$ARCH_SUFFIX
          path: |
            release/aria2c-$ARCH_SUFFIX
            release/OptionHandlerFactory.cc-$ARCH_SUFFIX