name: Build aria2 with OpenSSL (Linux 64-bit and 32-bit)

on:
  push:
    branches:
      - main
    paths:
      - '**'  # 触发条件：推送任何文件时均触发构建
  workflow_dispatch:  # 增加手工触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, i686]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autotools-dev \
            libtool \
            pkg-config \
            libssl-dev \
            libexpat1-dev \
            libc-ares-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libcppunit-dev \
            git \
            wget \
            gcc-multilib

      - name: Set up environment for ${{ matrix.arch }}
        run: |
          if [ "${{ matrix.arch }}" = "i686" ]; then
            export CC="gcc -m32"
            export CXX="g++ -m32"
            export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
          else
            export CC="gcc"
            export CXX="g++"
            export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          fi

      - name: Build and install c-ares
        run: |
          wget https://github.com/c-ares/c-ares/releases/download/v1.34.4/c-ares-1.34.4.tar.gz
          tar xzf c-ares-1.34.4.tar.gz
          cd c-ares-1.34.4
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install expat
        run: |
          wget https://github.com/libexpat/libexpat/releases/download/R_2_6_4/expat-2.6.4.tar.gz
          tar xzf expat-2.6.4.tar.gz
          cd expat-2.6.4
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install zlib
        run: |
          wget https://zlib.net/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install sqlite3
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3480000.tar.gz
          tar xzf sqlite-autoconf-3480000.tar.gz
          cd sqlite-autoconf-3480000
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install libssh2
        run: |
          wget https://libssh2.org/download/libssh2-1.11.1.tar.gz
          tar xzf libssh2-1.11.1.tar.gz
          cd libssh2-1.11.1
          ./configure --prefix=/usr/local --with-openssl
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install aria2 (static)
        run: |
          git clone https://github.com/aria2/aria2.git
          cd aria2
          autoreconf -i
          ./configure \
            --prefix=/usr/local \
            --enable-static \
            --disable-shared \
            --with-openssl \
            --without-gnutls \
            --without-libnettle \
            --without-libgcrypt \
            --without-appletls \
            --without-wintls \
            --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
            --with-libexpat \
            --with-libz \
            --with-libcares \
            --with-sqlite3 \
            --with-libssh2
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Verify aria2 compilation
        run: |
          /usr/local/bin/aria2c --version
          if [ $? -eq 0 ]; then
            echo "aria2 compilation verified successfully!"
          else
            echo "aria2 compilation failed!"
            exit 1
          fi

      - name: Package aria2 binary
        run: |
          mkdir -p release
          cp /usr/local/bin/aria2c release/aria2c-${{ matrix.arch }}
          strip release/aria2c-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: aria2-${{ matrix.arch }}
          path: release/aria2c-${{ matrix.arch }}