name: Build aria2 with OpenSSL (Multi-Architecture)

on:
  push:
    branches:
      - master
    paths:
      - '**'
  workflow_dispatch:

env:
  # 定义依赖库的版本
  CARES_VERSION: "1.34.4"
  EXPAT_VERSION: "2.6.4"
  ZLIB_VERSION: "1.3.1"
  SQLITE_VERSION: "3480000"
  LIBSSH2_VERSION: "1.11.1"
  OPENSSL_VERSION: "3.4.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64, arm64, 386, armv7]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install common dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autotools-dev \
            libtool \
            pkg-config \
            libssl-dev \
            libexpat1-dev \
            libc-ares-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libcppunit-dev \
            git \
            wget \
            autopoint

      - name: Set up environment for ${{ matrix.arch }}
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            export CC="gcc"
            export CXX="g++"
            export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
            export ARCH_SUFFIX="linux-amd64"
            # 安装 gcc-multilib 用于 amd64 和 386
            sudo apt-get install -y gcc-multilib
          elif [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC="aarch64-linux-gnu-gcc"
            export CXX="aarch64-linux-gnu-g++"
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
            export ARCH_SUFFIX="linux-arm64"
            # 安装 arm64 交叉编译工具链
            sudo apt-get install -y gcc-11-aarch64-linux-gnu g++-11-aarch64-linux-gnu
            export HOST="aarch64-linux-gnu"  # 设置正确的目标架构名称
          elif [ "${{ matrix.arch }}" = "386" ]; then
            export CC="gcc -m32"
            export CXX="g++ -m32"
            export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            export ARCH_SUFFIX="linux-386"
            # 安装 gcc-multilib 用于 386
            sudo apt-get install -y gcc-multilib
            export HOST="i386-linux-gnu"  # 设置正确的目标架构名称
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            export CC="arm-linux-gnueabihf-gcc"
            export CXX="arm-linux-gnueabihf-g++"
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
            export ARCH_SUFFIX="linux-armv7"
            # 安装 armhf 交叉编译工具链
            sudo apt-get install -y gcc-11-arm-linux-gnueabihf g++-11-arm-linux-gnueabihf
            export HOST="arm-linux-gnueabihf"  # 设置正确的目标架构名称
          fi

          echo "ARCH_SUFFIX is set to: $ARCH_SUFFIX"
          echo "ARCH_SUFFIX=$ARCH_SUFFIX" >> $GITHUB_ENV

      - name: Build and install OpenSSL
        run: |
          wget https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz
          tar xzf openssl-${{ env.OPENSSL_VERSION }}.tar.gz
          cd openssl-${{ env.OPENSSL_VERSION }}
          if [ -n "$HOST" ]; then
            ./Configure --prefix=/usr/local --openssldir=/usr/local/ssl $HOST
          else
            ./config --prefix=/usr/local --openssldir=/usr/local/ssl
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install c-ares
        run: |
          wget https://github.com/c-ares/c-ares/releases/download/v${{ env.CARES_VERSION }}/c-ares-${{ env.CARES_VERSION }}.tar.gz
          tar xzf c-ares-${{ env.CARES_VERSION }}.tar.gz
          cd c-ares-${{ env.CARES_VERSION }}
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install expat
        run: |
          # 将 EXPAT_VERSION 从 2.6.4 转换为 R_2_6_4
          EXPAT_VERSION_UNDERSCORE=$(echo ${{ env.EXPAT_VERSION }} | sed 's/\./_/g')
          EXPAT_VERSION_UNDERSCORE="R_${EXPAT_VERSION_UNDERSCORE}"
          
          wget https://github.com/libexpat/libexpat/releases/download/$EXPAT_VERSION_UNDERSCORE/expat-${{ env.EXPAT_VERSION }}.tar.gz
          tar xzf expat-${{ env.EXPAT_VERSION }}.tar.gz
          cd expat-${{ env.EXPAT_VERSION }}
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install zlib
        run: |
          wget https://zlib.net/zlib-${{ env.ZLIB_VERSION }}.tar.gz
          tar xzf zlib-${{ env.ZLIB_VERSION }}.tar.gz
          cd zlib-${{ env.ZLIB_VERSION }}
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install sqlite3
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-${{ env.SQLITE_VERSION }}.tar.gz
          tar xzf sqlite-autoconf-${{ env.SQLITE_VERSION }}.tar.gz
          cd sqlite-autoconf-${{ env.SQLITE_VERSION }}
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --host=$HOST
          else
            ./configure --prefix=/usr/local
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install libssh2
        run: |
          wget https://libssh2.org/download/libssh2-${{ env.LIBSSH2_VERSION }}.tar.gz
          tar xzf libssh2-${{ env.LIBSSH2_VERSION }}.tar.gz
          cd libssh2-${{ env.LIBSSH2_VERSION }}
          if [ -n "$HOST" ]; then
            ./configure --prefix=/usr/local --with-openssl --host=$HOST
          else
            ./configure --prefix=/usr/local --with-openssl
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build and install aria2 (static)
        run: |
          git clone https://github.com/aria2/aria2.git
          cd aria2

          if [ -d "$GITHUB_WORKSPACE/patch" ]; then
            echo "Applying patches from $GITHUB_WORKSPACE/patch..."
            for patch_file in $GITHUB_WORKSPACE/patch/*.patch; do
              echo "Applying patch: $patch_file"
              if ! patch -p1 < "$patch_file"; then
                echo "Failed to apply patch: $patch_file"
                echo "Check the patch file and ensure it is compatible with the current aria2 version."
                exit 1
              fi
            done
          else
            echo "No patch directory found, skipping patch application."
          fi

          autoreconf -f -i
          if [ -n "$HOST" ]; then
            ./configure \
              --prefix=/usr/local \
              --enable-static \
              --disable-shared \
              --with-openssl \
              --without-gnutls \
              --without-libnettle \
              --without-libgcrypt \
              --without-appletls \
              --without-wintls \
              --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
              --with-libexpat \
              --with-libz \
              --with-libcares \
              --with-sqlite3 \
              --with-libssh2 \
              --host=$HOST
          else
            ./configure \
              --prefix=/usr/local \
              --enable-static \
              --disable-shared \
              --with-openssl \
              --without-gnutls \
              --without-libnettle \
              --without-libgcrypt \
              --without-appletls \
              --without-wintls \
              --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
              --with-libexpat \
              --with-libz \
              --with-libcares \
              --with-sqlite3 \
              --with-libssh2
          fi
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Verify aria2 compilation
        run: |
          /usr/local/bin/aria2c --version
          if [ $? -eq 0 ]; then
            echo "aria2 compilation verified successfully!"
          else
            echo "aria2 compilation failed!"
            exit 1
          fi

      - name: Package aria2 binary
        env:
          ARCH_SUFFIX: ${{ env.ARCH_SUFFIX }}
        run: |
          mkdir -p release
          # 复制编译好的 aria2c 二进制文件
          if [ -f "/usr/local/bin/aria2c" ]; then
            cp /usr/local/bin/aria2c "release/aria2c-$ARCH_SUFFIX"
            strip "release/aria2c-$ARCH_SUFFIX"
            echo "aria2c binary copied to release/aria2c-$ARCH_SUFFIX"
          else
            echo "aria2c binary not found at /usr/local/bin/aria2c!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-${{ env.ARCH_SUFFIX }}
          path: release/aria2c-${{ env.ARCH_SUFFIX }}