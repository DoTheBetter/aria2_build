name: Build aria2 with OpenSSL for Linux (64/32-bit)

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/linux-aria2.yml'
  workflow_dispatch:

env:
  CARES_VERSION: "1.34.4"
  EXPAT_VERSION: "2.6.4"
  ZLIB_VERSION: "1.3.1"
  SQLITE_VERSION: "3480000"
  LIBSSH2_VERSION: "1.11.1"
  OPENSSL_VERSION: "3.4.0"
  CPPUNIT_VERSION: "1.15.1"

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64, arm64, 386, armv7]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker container for ${{ matrix.arch }}
        id: docker
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "Using amd64 Docker image"
            echo "CONTAINER_IMAGE=ubuntu:22.04" >> $GITHUB_ENV
          elif [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "Using arm64 Docker image"
            echo "CONTAINER_IMAGE=arm64v8/ubuntu:22.04" >> $GITHUB_ENV
          elif [ "${{ matrix.arch }}" = "386" ]; then
            echo "Using i386 Docker image"
            echo "CONTAINER_IMAGE=i386/ubuntu:22.04" >> $GITHUB_ENV
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            echo "Using armv7 Docker image"
            echo "CONTAINER_IMAGE=arm32v7/ubuntu:22.04" >> $GITHUB_ENV
          fi

      - name: Run build steps in Docker container
        uses: docker://${{ env.CONTAINER_IMAGE }}
        with:
          entrypoint: /bin/bash
          args: |
            -c "
            set -e
            apt-get update
            apt-get install -y \
              build-essential \
              autoconf \
              automake \
              autotools-dev \
              libtool \
              pkg-config \
              libssl-dev \
              libexpat1-dev \
              libc-ares-dev \
              libsqlite3-dev \
              zlib1g-dev \
              git \
              wget \
              autopoint

            if [ \"${{ matrix.arch }}\" = \"amd64\" ]; then
              export CC=\"gcc\"
              export CXX=\"g++\"
              export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
              export ARCH_SUFFIX=\"linux-amd64\"
              export HOST=\"x86_64-linux-gnu\"
              apt-get install -y gcc-multilib
            elif [ \"${{ matrix.arch }}\" = \"arm64\" ]; then
              export CC=\"aarch64-linux-gnu-gcc\"
              export CXX=\"aarch64-linux-gnu-g++\"
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
              export ARCH_SUFFIX=\"linux-arm64\"
              export HOST=\"aarch64-linux-gnu\"
              apt-get install -y gcc-11-aarch64-linux-gnu g++-11-aarch64-linux-gnu
            elif [ \"${{ matrix.arch }}\" = \"386\" ]; then
              export CC=\"gcc -m32\"
              export CXX=\"g++ -m32\"
              export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
              export ARCH_SUFFIX=\"linux-386\"
              export HOST=\"i386-linux-gnu\"
              apt-get install -y gcc-multilib
            elif [ \"${{ matrix.arch }}\" = \"armv7\" ]; then
              export CC=\"arm-linux-gnueabihf-gcc\"
              export CXX=\"arm-linux-gnueabihf-g++\"
              export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
              export ARCH_SUFFIX=\"linux-armv7\"
              export HOST=\"arm-linux-gnueabihf\"
              apt-get install -y gcc-11-arm-linux-gnueabihf g++-11-arm-linux-gnueabihf
            fi

            # Build and install CppUnit
            wget http://dev-www.libreoffice.org/src/cppunit-$CPPUNIT_VERSION.tar.gz
            tar xzf cppunit-$CPPUNIT_VERSION.tar.gz
            cd cppunit-$CPPUNIT_VERSION
            if [ -n \"$HOST\" ]; then
              ./configure --prefix=/usr/local --host=$HOST --disable-shared --enable-static
            else
              ./configure --prefix=/usr/local --disable-shared --enable-static
            fi
            make -j$(nproc)
            make install

            # Build and install OpenSSL
            wget https://www.openssl.org/source/openssl-$OPENSSL_VERSION.tar.gz
            tar xzf openssl-$OPENSSL_VERSION.tar.gz
            cd openssl-$OPENSSL_VERSION
            if [ -n \"$HOST\" ]; then
              ./Configure --prefix=/usr/local --openssldir=/usr/local/ssl $HOST no-shared
            else
              ./config --prefix=/usr/local --openssldir=/usr/local/ssl no-shared
            fi
            make -j$(nproc)
            make install

            # Build and install c-ares
            wget https://github.com/c-ares/c-ares/releases/download/v$CARES_VERSION/c-ares-$CARES_VERSION.tar.gz
            tar xzf c-ares-$CARES_VERSION.tar.gz
            cd c-ares-$CARES_VERSION
            if [ -n \"$HOST\" ]; then
              ./configure --prefix=/usr/local --host=$HOST --disable-shared --enable-static
            else
              ./configure --prefix=/usr/local --disable-shared --enable-static
            fi
            make -j$(nproc)
            make install

            # Build and install expat
            EXPAT_VERSION_UNDERSCORE=$(echo $EXPAT_VERSION | sed 's/\./_/g')
            EXPAT_VERSION_UNDERSCORE=\"R_${EXPAT_VERSION_UNDERSCORE}\"
            wget https://github.com/libexpat/libexpat/releases/download/$EXPAT_VERSION_UNDERSCORE/expat-$EXPAT_VERSION.tar.gz
            tar xzf expat-$EXPAT_VERSION.tar.gz
            cd expat-$EXPAT_VERSION
            if [ -n \"$HOST\" ]; then
              ./configure --prefix=/usr/local --host=$HOST --disable-shared --enable-static
            else
              ./configure --prefix=/usr/local --disable-shared --enable-static
            fi
            make -j$(nproc)
            make install

            # Build and install zlib
            wget https://zlib.net/zlib-$ZLIB_VERSION.tar.gz
            tar xzf zlib-$ZLIB_VERSION.tar.gz
            cd zlib-$ZLIB_VERSION
            if [ -n \"$HOST\" ]; then
              ./configure --prefix=/usr/local --host=$HOST --static
            else
              ./configure --prefix=/usr/local --static
            fi
            make -j$(nproc)
            make install

            # Build and install sqlite3
            wget https://www.sqlite.org/2025/sqlite-autoconf-$SQLITE_VERSION.tar.gz
            tar xzf sqlite-autoconf-$SQLITE_VERSION.tar.gz
            cd sqlite-autoconf-$SQLITE_VERSION
            if [ -n \"$HOST\" ]; then
              ./configure --prefix=/usr/local --host=$HOST --disable-shared --enable-static
            else
              ./configure --prefix=/usr/local --disable-shared --enable-static
            fi
            make -j$(nproc)
            make install

            # Build and install libssh2
            wget https://libssh2.org/download/libssh2-$LIBSSH2_VERSION.tar.gz
            tar xzf libssh2-$LIBSSH2_VERSION.tar.gz
            cd libssh2-$LIBSSH2_VERSION
            if [ -n \"$HOST\" ]; then
              ./configure --prefix=/usr/local --with-openssl --host=$HOST --disable-shared --enable-static
            else
              ./configure --prefix=/usr/local --with-openssl --disable-shared --enable-static
            fi
            make -j$(nproc)
            make install

            # Build and install aria2 (static)
            git clone https://github.com/aria2/aria2.git
            cd aria2
            if [ -d \"/github/workspace/patch\" ]; then
              for patch_file in /github/workspace/patch/*.patch; do
                patch -p1 < \"$patch_file\" || exit 1
              done
            fi
            autoreconf -f -i
            if [ -n \"$HOST\" ]; then
              ./configure \
                --prefix=/usr/local \
                --enable-static \
                --disable-shared \
                --with-openssl \
                --without-gnutls \
                --without-libnettle \
                --without-libgcrypt \
                --without-appletls \
                --without-wintls \
                --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
                --with-libexpat \
                --with-libz \
                --with-libcares \
                --with-sqlite3 \
                --with-libssh2 \
                --host=$HOST \
                LDFLAGS=\"-static -static-libgcc -static-libstdc++\"
            else
              ./configure \
                --prefix=/usr/local \
                --enable-static \
                --disable-shared \
                --with-openssl \
                --without-gnutls \
                --without-libnettle \
                --without-libgcrypt \
                --without-appletls \
                --without-wintls \
                --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt \
                --with-libexpat \
                --with-libz \
                --with-libcares \
                --with-sqlite3 \
                --with-libssh2 \
                LDFLAGS=\"-static -static-libgcc -static-libstdc++\"
            fi
            make -j$(nproc)
            strip src/aria2c

            # Run aria2 tests
            make check
            ./src/aria2c --version

            # Generate SHA256 checksum
            cd src
            sha256sum aria2c > aria2c.sha256
            cat aria2c.sha256

            # Get aria2 version
            ARIA2_VERSION=$(grep 'PACKAGE_VERSION=' configure | cut -d\"'\" -f2)
            echo \"ARIA2_VERSION=${ARIA2_VERSION}\" >> $GITHUB_ENV

            # Package aria2 binary
            mkdir -p /github/workspace/release
            BINARY_NAME=\"aria2-$ARIA2_VERSION-$ARCH_SUFFIX\"
            echo \"BINARY_NAME=$BINARY_NAME\" >> $GITHUB_ENV

            cp aria2c \"/github/workspace/release/$BINARY_NAME\"
            cp aria2c.sha256 \"/github/workspace/release/$BINARY_NAME.sha256\"
            sed -i \"s/aria2c/$BINARY_NAME/\" \"/github/workspace/release/$BINARY_NAME.sha256\"
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: |
            release/${{ env.BINARY_NAME }}
            release/${{ env.BINARY_NAME }}.sha256