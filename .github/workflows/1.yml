name: Build and Release aria2c

on:
  workflow_dispatch:

env:
  GMP_VERSION: "6.3.0"
  EXPAT_VERSION: "2.6.4"
  SQLITE_YEAR: "2025"
  SQLITE_VERSION: "3480000"
  ZLIB_VERSION: "1.3.1"
  CARES_VERSION: "1.34.4"
  LIBSSH2_VERSION: "1.11.1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get latest aria2c version
        run: |
          VERSION=$(git ls-remote --tags https://github.com/aria2/aria2.git | awk -F/ '{print $3}' | grep -v {} | sort -V | tail -n1)
          echo "ARIA2_VERSION=$VERSION" >> $GITHUB_ENV
          echo "aria2 version: ${ARIA2_VERSION}"

      - name: Build and release aria2c
        run: |
          release_mingw() {
            local HOST=$1
            local LABEL=$2

            mkdir -p mingw-out

            docker build \
              --build-arg HOST=$HOST \
              --build-arg ARIA2_VERSION=${{ env.ARIA2_VERSION }} \
              --build-arg ARIA2_REF=refs/tags/${{ env.ARIA2_VERSION }} \
              --build-arg GMP_VERSION=${{ env.GMP_VERSION }} \
              --build-arg EXPAT_VERSION=${{ env.EXPAT_VERSION }} \
              --build-arg SQLITE_YEAR=${{ env.SQLITE_YEAR }} \
              --build-arg SQLITE_VERSION=${{ env.SQLITE_VERSION }} \
              --build-arg ZLIB_VERSION=${{ env.ZLIB_VERSION }} \
              --build-arg CARES_VERSION=${{ env.CARES_VERSION }} \
              --build-arg LIBSSH2_VERSION=${{ env.LIBSSH2_VERSION }} \
              -t aria2-mingw-$HOST - < Dockerfile/Dockerfile.mingw.txt

            docker run --rm -it -v $PWD/mingw-out:/out aria2-mingw-$HOST \
              sh -c "cp /aria2/src/aria2c.exe /out/aria2c-${{ env.ARIA2_VERSION }}-$LABEL.exe"

          }

          # 构建 32 位版本
          release_mingw i686-w64-mingw32 win-32bit

          # 构建 64 位版本
          release_mingw x86_64-w64-mingw32 win-64bit

      - name: List files in mingw-out
        run: |
          echo "Files in mingw-out:"
          ls -l $PWD/mingw-out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2c-binaries
          path: ${{ github.workspace }}/mingw-out